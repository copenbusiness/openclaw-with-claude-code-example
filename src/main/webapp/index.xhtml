<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Sales User Management</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <h:outputStylesheet library="css" name="style.css"/>
</h:head>
<h:body>
    <div class="container">
        <h1>Sales User Management</h1>

        <h2>#{salesUserController.formTitle}</h2>

        <h:form id="userForm">
            <h:inputHidden value="#{salesUserController.selectedUserId}"/>

            <div class="form-group">
                <h:outputLabel for="userName" value="User Name: *"/>
                <h:inputText id="userName" value="#{salesUserController.user.userName}"
                             required="true" requiredMessage="User name is required"
                             size="30" maxlength="50"/>
                <h:message for="userName" styleClass="error"/>
            </div>

            <div class="form-group">
                <h:outputLabel for="password" value="Password: *"/>
                <h:inputSecret id="password" value="#{salesUserController.user.password}"
                               required="true" requiredMessage="Password is required"
                               size="30" maxlength="100"/>
                <h:message for="password" styleClass="error"/>
            </div>

            <div class="form-group">
                <h:outputLabel for="email" value="Email: *"/>
                <h:inputText id="email" value="#{salesUserController.user.email}"
                             required="true" requiredMessage="Email is required"
                             size="30" maxlength="100"/>
                <h:message for="email" styleClass="error"/>
            </div>

            <div class="form-group">
                <h:outputLabel for="phone" value="Phone:"/>
                <h:inputText id="phone" value="#{salesUserController.user.phone}"
                             size="20" maxlength="20"/>
                <h:message for="phone" styleClass="error"/>
            </div>

            <div class="form-group">
                <h:outputLabel for="personType" value="Person Type:"/>
                <h:selectOneMenu id="personType" value="#{salesUserController.user.personType}">
                    <f:selectItem itemLabel="Select Person Type" itemValue=""/>
                    <f:selectItem itemLabel="Employee" itemValue="Employee"/>
                    <f:selectItem itemLabel="Contractor" itemValue="Contractor"/>
                    <f:selectItem itemLabel="Partner" itemValue="Partner"/>
                </h:selectOneMenu>
                <h:message for="personType" styleClass="error"/>
            </div>

            <div class="form-group">
                <h:outputLabel for="businessUnit" value="Business Unit:"/>
                <h:inputText id="businessUnit" value="#{salesUserController.user.businessUnit}"
                             size="30" maxlength="50"/>
                <h:message for="businessUnit" styleClass="error"/>
            </div>

            <div class="form-buttons">
                <h:commandButton value="#{salesUserController.submitButtonLabel}"
                                 action="#{salesUserController[ salesUserController.formAction ]()}"/>
                <h:commandButton value="Cancel" immediate="true"
                                 action="#{salesUserController.setSelectedUserId(null)}"
                                 onclick="this.form.reset();"/>
            </div>
        </h:form>

        <h2>Sales Users List</h2>

        <h:dataTable value="#{salesUserController.users}" var="user"
                     styleClass="user-table" headerClass="table-header" rowClasses="table-row-odd,table-row-even">
            <h:column>
                <f:facet name="header">User ID</f:facet>
                #{user.userId}
            </h:column>
            <h:column>
                <f:facet name="header">User Name</f:facet>
                #{user.userName}
            </h:column>
            <h:column>
                <f:facet name="header">Email</f:facet>
                #{user.email}
            </h:column>
            <h:column>
                <f:facet name="header">Phone</f:facet>
                #{user.phone}
            </h:column>
            <h:column>
                <f:facet name="header">Person Type</f:facet>
                #{user.personType}
            </h:column>
            <h:column>
                <f:facet name="header">Business Unit</f:facet>
                #{user.businessUnit}
            </h:column>
            <h:column>
                <f:facet name="header">Actions</f:facet>
                <h:commandLink value="Edit"
                               action="#{salesUserController.setSelectedUserId(user.userId)}"
                               onclick="document.getElementById('userForm').scrollIntoView();">
                    <f:setPropertyActionListener target="#{salesUserController.selectedUserId}" value="#{user.userId}"/>
                </h:commandLink>
                |
                <h:commandLink value="Delete"
                               action="#{salesUserController.deleteUser(user.userId)}"
                               onclick="return confirm('Are you sure you want to delete this user?');"/>
            </h:column>
        </h:dataTable>

        <p><small>* indicates required field</small></p>
    </div>

    <script>
        // Auto-load user data when selectedUserId changes
        document.addEventListener('DOMContentLoaded', function() {
            var selectedUserId = document.querySelector('input[id$="selectedUserId"]');
            if (selectedUserId && selectedUserId.value) {
                // Trigger form reset and load (in real app would use AJAX)
                console.log('Edit mode for user ID:', selectedUserId.value);
            }
        });
    </script>
</h:body>
</html>
